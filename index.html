*{box-sizing:border-box;margin:0;padding:0}
:root{

  --sky:#eef4ff;--sky2:#d4e2f8;--sky3:#9fb8e4;

html,body{height:100%;background:var(--ink)}

#root{height:100%}
.shell{display:flex;height:100vh;overflow:hidden}
.nav{width:220px;background:var(--ink2);border-right:1px solid var(--rim);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s}
.nav.collapsed{width:56px}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid var(--rim);display:flex;align-items:center;gap:10px;overflow:hidden}
.nav-logo-mark{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:800;font-size:14px;color:var(--ink);flex-shrink:0}
.nav-logo-text{overflow:hidden;white-space:nowrap}
.nav-logo-title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--sky)}

.nav-body{flex:1;padding:8px;overflow-y:auto}
.nav-section{padding:10px 8px 4px;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--mist2);white-space:nowrap;overflow:hidden}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--mist);font-size:12px;font-weight:500;transition:all .12s;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-decoration:none}
.nav-item:hover{color:var(--sky);background:var(--ink3)}
.nav-item.active{color:var(--amber);background:var(--amber3);font-weight:600}
.nav-icon{font-size:15px;flex-shrink:0;width:18px;text-align:center}
.nav-badge{margin-left:auto;background:var(--rose);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;font-family:var(--font-m)}
.nav-foot{padding:12px;border-top:1px solid var(--rim)}
.user-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:var(--ink3);cursor:pointer;overflow:hidden}
.user-av{width:28px;height:28px;border-radius:50%;background:var(--amber3);border:1.5px solid var(--amber);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;font-size:11px;color:var(--amber);flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-weight:600;font-size:11px;color:var(--sky);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:9px;color:var(--mist);text-transform:uppercase;letter-spacing:.8px}
.logout-btn{background:none;border:none;cursor:pointer;color:var(--mist);font-size:13px;padding:2px;flex-shrink:0}
.logout-btn:hover{color:var(--rose)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:10px 20px;background:var(--ink2);border-bottom:1px solid var(--rim);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.topbar-left{display:flex;align-items:center;gap:10px}
.hamburger{background:none;border:none;cursor:pointer;color:var(--mist);font-size:18px;padding:4px;line-height:1}
.breadcrumb{font-family:var(--font-h);font-size:14px;font-weight:600;color:var(--sky)}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:var(--ink3);border:1px solid var(--rim2);font-size:11px;color:var(--mist);cursor:pointer;transition:all .12s}
.topbar-chip:hover{color:var(--sky)}
.content{flex:1;overflow-y:auto;padding:20px}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink);padding:20px;position:relative;overflow:hidden}
.auth-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 80% 20%,rgba(245,166,35,.06),transparent),radial-gradient(ellipse 40% 40% at 10% 80%,rgba(96,165,250,.05),transparent)}
.auth-card{background:var(--ink2);border:1px solid var(--rim);border-radius:16px;padding:36px 32px;width:100%;max-width:400px;position:relative;z-index:1}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-mark{width:52px;height:52px;border-radius:14px;background:var(--amber);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:800;font-size:20px;color:var(--ink)}
.auth-title{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--sky)}
.auth-sub{font-size:11px;color:var(--mist);margin-top:3px;letter-spacing:.5px}
.auth-tabs{display:flex;background:var(--ink3);border-radius:8px;padding:3px;margin-bottom:20px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--mist);transition:all .12s}
.auth-tab.on{background:var(--ink2);color:var(--amber);font-weight:700}
.role-select{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:4px}
.role-opt{padding:8px;border-radius:8px;border:1px solid var(--rim);cursor:pointer;text-align:center;transition:all .12s}
.role-opt:hover{border-color:var(--rim2)}
.role-opt.on{border-color:var(--amber);background:var(--amber3)}
.role-opt-icon{font-size:18px;margin-bottom:3px}
.role-opt-name{font-size:11px;font-weight:600;color:var(--sky)}
.role-opt-desc{font-size:9px;color:var(--mist);margin-top:1px}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.field label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mist)}
.field input,.field select,.field textarea{background:var(--ink3);border:1px solid var(--rim2);border-radius:8px;color:var(--sky);padding:9px 12px;font-family:var(--font-b);font-size:13px;outline:none;transition:border .12s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--amber)}
.field input::placeholder{color:var(--mist2)}
select option{background:var(--ink2)}
textarea{resize:vertical;min-height:72px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-family:var(--font-b);font-size:12px;font-weight:600;transition:all .13s;text-decoration:none;white-space:nowrap}
.btn-amber{background:var(--amber);color:var(--ink)}.btn-amber:hover{background:var(--amber2)}

.btn-ghost{background:transparent;color:var(--mist);border:1px solid var(--rim2)}.btn-ghost:hover{color:var(--sky);background:var(--ink3)}
.btn-danger{background:transparent;color:var(--rose);border:1px solid rgba(244,63,94,.2)}.btn-danger:hover{background:rgba(244,63,94,.08)}
.btn-full{width:100%;justify-content:center;padding:11px}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.err-box{background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);color:var(--rose);padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:12px}
.ok-box{background:rgba(34,211,160,.06);border:1px solid rgba(34,211,160,.2);color:var(--jade);padding:9px 12px;border-radius:8px;font-size:12px;margin-bottom:12px}
.card{background:var(--ink2);border:1px solid var(--rim);border-radius:12px;padding:16px}
.card-title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--sky)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--ink2);border:1px solid var(--rim);border-radius:12px;padding:14px 16px;border-top:2px solid transparent;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:50%;opacity:.06;transform:translate(20px,-20px)}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mist);margin-bottom:6px}
.kpi-val{font-family:var(--font-h);font-size:22px;font-weight:800;line-height:1;margin-bottom:3px}
.kpi-sub{font-size:10px;color:var(--mist)}
.kpi-amber{border-top-color:var(--amber)}.kpi-amber .kpi-val{color:var(--amber)}.kpi-amber::before{background:var(--amber)}
.kpi-jade{border-top-color:var(--jade)}.kpi-jade .kpi-val{color:var(--jade)}.kpi-jade::before{background:var(--jade)}
.kpi-azure{border-top-color:var(--azure)}.kpi-azure .kpi-val{color:var(--azure)}.kpi-azure::before{background:var(--azure)}
.kpi-violet{border-top-color:var(--violet)}.kpi-violet .kpi-val{color:var(--violet)}.kpi-violet::before{background:var(--violet)}
.kpi-rose{border-top-color:var(--rose)}.kpi-rose .kpi-val{color:var(--rose)}.kpi-rose::before{background:var(--rose)}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--rim)}
table{width:100%;border-collapse:collapse}
th{background:var(--ink3);color:var(--mist);font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:9px 12px;text-align:left;border-bottom:1px solid var(--rim);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid rgba(42,58,82,.5);vertical-align:middle;color:var(--sky)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.01)}
.mono{font-family:var(--font-m);font-size:11px}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.5px;font-family:var(--font-m);white-space:nowrap}
.b-amber{background:rgba(245,166,35,.12);color:var(--amber)}
.b-jade{background:rgba(34,211,160,.1);color:var(--jade)}
.b-rose{background:rgba(244,63,94,.1);color:var(--rose)}
.b-azure{background:rgba(96,165,250,.1);color:var(--azure)}
.b-violet{background:rgba(167,139,250,.1);color:var(--violet)}
.b-mist{background:rgba(107,132,168,.12);color:var(--mist)}

.modal{background:var(--ink2);border:1px solid var(--rim);border-radius:14px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal.wide{max-width:780px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--rim);position:sticky;top:0;background:var(--ink2);z-index:1}
.modal-title{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--sky)}
.modal-body{padding:20px;flex:1}
.modal-foot{padding:12px 20px;border-top:1px solid var(--rim);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--ink2)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.g3{grid-template-columns:1fr 1fr 1fr}
.span2{grid-column:1/-1}
.page-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.page-title{font-family:var(--font-h);font-size:16px;font-weight:700;color:var(--sky)}
.page-sub{font-size:11px;color:var(--mist);margin-top:2px}
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.search-box{position:relative;flex:1;min-width:160px;max-width:260px}

.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--mist2);font-size:13px}

.empty-icon{font-size:48px;margin-bottom:10px;opacity:.3}
.empty-text{font-size:13px}
.loading{display:flex;align-items:center;justify-content:center;height:200px}
.spin{width:32px;height:32px;border:2.5px solid var(--rim2);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;border-radius:8px;font-size:12px;margin-bottom:12px}
.alert-warn{background:rgba(245,166,35,.06);border:1px solid rgba(245,166,35,.2);color:var(--amber)}
.alert-err{background:rgba(244,63,94,.06);border:1px solid rgba(244,63,94,.2);color:var(--rose)}

.progress-bar{height:4px;background:var(--ink3);border-radius:2px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.currency-tabs{display:flex;gap:4px}
.currency-tab{padding:4px 10px;border-radius:6px;border:1px solid var(--rim2);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font-m);color:var(--mist);transition:all .12s}
.currency-tab.on{background:var(--amber3);border-color:var(--amber);color:var(--amber)}
.sync-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
.sync-ok{background:var(--jade)}.sync-busy{background:var(--amber);animation:pulse 1s infinite}.sync-err{background:var(--rose)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.chart-bar{display:flex;flex-direction:column;gap:8px}
.chart-bar-row{display:flex;align-items:center;gap:8px}
.chart-bar-label{width:90px;font-size:11px;color:var(--mist);text-align:right;flex-shrink:0}
.chart-bar-track{flex:1;height:14px;background:var(--ink3);border-radius:4px;overflow:hidden}
.chart-bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.chart-bar-val{width:60px;font-family:var(--font-m);font-size:11px;color:var(--sky);text-align:right;flex-shrink:0}
@media(max-width:768px){
  .nav{position:fixed;top:0;left:0;height:100vh;z-index:200;transform:translateX(-100%);width:220px!important}
  .nav.mobile-open{transform:translateX(0)}
  .mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:199}
  .form-grid,.form-grid.g3{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .content{padding:14px}
}
</style>

function useCol(col){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const lsKey=`geoser_${col}`;
  const loadLocal=()=>{try{return JSON.parse(localStorage.getItem(lsKey)||"[]")}catch{return[]}};
  useEffect(()=>{
    if(!db){setItems(SEED[col]||loadLocal());setLoading(false);return}
    setLoading(true);
    const q=firebase.firestore().collection(col).orderBy("_ts","desc");
    const unsub=q.onSnapshot(snap=>{
      if(snap.empty&&SEED[col]){
        const batch=db.batch();
        (SEED[col]||[]).forEach(d=>{const r=db.collection(col).doc(d.id);batch.set(r,{...d,_ts:firebase.firestore.FieldValue.serverTimestamp()})});
        batch.commit().catch(()=>{});
        setItems(SEED[col]||[]);
      }else{
        const data=snap.docs.map(d=>({...d.data(),id:d.id}));
        setItems(data);
        localStorage.setItem(lsKey,JSON.stringify(data));
      }
      setLoading(false);
    },err=>{
      console.warn(col,"fallback:",err.message);
      setItems(SEED[col]||loadLocal());
      setLoading(false);
    });
    return unsub;
  },[col]);
  const save=async(data)=>{
    try{
      const ref=data.id?db.collection(col).doc(data.id):db.collection(col).doc();
      await ref.set({...data,id:ref.id,_ts:firebase.firestore.FieldValue.serverTimestamp()});
      return ref.id;
    }catch{
      const newItems=items.some(i=>i.id===data.id)?items.map(i=>i.id===data.id?data:i):[...items,{...data,id:data.id||uid()}];
      setItems(newItems);
      localStorage.setItem(lsKey,JSON.stringify(newItems));
      return data.id;
    }
  };
  const remove=async(id)=>{
    try{await db.collection(col).doc(id).delete()}
    catch{
      const newItems=items.filter(i=>i.id!==id);
      setItems(newItems);
      localStorage.setItem(lsKey,JSON.stringify(newItems));
    }
  };
  return{items,loading,save,remove};
}

function AuthProvider({children}){
  const [user,setUser]=useState(undefined);
  useEffect(()=>{
    if(!auth){setUser(null);return}
    return auth.onAuthStateChanged(async u=>{
      if(u){
        let profile={role:"admin",name:u.displayName||u.email};
        try{const snap=await db.collection("users").doc(u.uid).get();if(snap.exists)profile=snap.data()}catch{}
        setUser({...u,...profile,uid:u.uid});
      }else setUser(null);
    });
  },[]);
  const login=async(email,pw)=>{const cred=await auth.signInWithEmailAndPassword(email,pw);return cred.user};
  const register=async(email,pw,name,role)=>{
    const cred=await auth.createUserWithEmailAndPassword(email,pw);
    await cred.user.updateProfile({displayName:name});
    await db.collection("users").doc(cred.user.uid).set({name,email,role,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    return cred.user;
  };
  const logout=()=>auth.signOut();
  const hasPage=(page)=>{if(!user)return false;return ROLES[user.role]?.pages.includes(page)||user.role==="admin"};
  return <AuthCtx.Provider value={{user,login,register,logout,hasPage}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

const ToastCtx=createContext(null);
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const toast=(msg,type="ok")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };
  return <ToastCtx.Provider value={toast}>
    {children}
    <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,display:"flex",flexDirection:"column",gap:8}}>
      {toasts.map(t=>(
        <div key={t.id} style={{padding:"10px 16px",borderRadius:8,fontSize:12,fontWeight:600,background:t.type==="ok"?"rgba(34,211,160,.9)":t.type==="err"?"rgba(244,63,94,.9)":"rgba(245,166,35,.9)",color:"#fff",boxShadow:"0 4px 20px rgba(0,0,0,.4)"}}>
          {t.type==="ok"?"✓ ":t.type==="err"?"✗ ":"⚠ "}{t.msg}

    </div>

}

function ReportsPage(){
  const {items:orders}=useCol("orders");

  const [cur,setCur]=useState("TRY");
  const [from,setFrom]=useState("");
  const [to,setTo]=useState("");
  const filtered=orders.filter(o=>{if(from&&o.orderDate<from)return false;if(to&&o.orderDate>to)return false;return true});
  const getTotal=o=>(o.items||[]).reduce((s,i)=>s+Number(i.qty||0)*Number(i.unitPrice||0),0);
  const totalRev=filtered.reduce((a,o)=>a+getTotal(o),0);
  const completedRev=filtered.filter(o=>o.status==="Tamamlandı").reduce((a,o)=>a+getTotal(o),0);
  const byCustomer=Object.values(filtered.reduce((a,o)=>{if(!a[o.customerName])a[o.customerName]={name:o.customerName,orders:0,total:0};a[o.customerName].orders++;a[o.customerName].total+=getTotal(o);return a},{})).sort((a,b)=>b.total-a.total);
  const downloadCSV=()=>{
    const rows=[["Sipariş No","Müşteri","Toplam","Durum","Tarih"],...filtered.map(o=>[o.orderNo,o.customerName,getTotal(o),o.status,o.orderDate])];
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));a.download="geoser-rapor.csv";a.click();
  };
  return <div>
    <div className="page-head">
      <div><div className="page-title">📊 Raporlar & Analizler</div></div>
      <div style={{display:"flex",gap:8}}><CurrencyTabs cur={cur} onChange={setCur}/><button className="btn btn-ghost btn-sm" onClick={downloadCSV}>⬇ CSV İndir</button></div>
    </div>
    <div className="card" style={{marginBottom:14}}>
      <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:12,color:"var(--mist)"}}>Tarih Aralığı:</span>
        <input type="date" value={from} onChange={e=>setFrom(e.target.value)} style={{background:"var(--ink3)",border:"1px solid var(--rim2)",borderRadius:6,color:"var(--sky)",padding:"6px 10px",fontSize:12}}/>
        <span style={{color:"var(--mist)"}}>—</span>
        <input type="date" value={to} onChange={e=>setTo(e.target.value)} style={{background:"var(--ink3)",border:"1px solid var(--rim2)",borderRadius:6,color:"var(--sky)",padding:"6px 10px",fontSize:12}}/>
        {(from||to)&&<button className="btn btn-ghost btn-xs" onClick={()=>{setFrom("");setTo("")}}>✕ Temizle</button>}
        <span style={{fontSize:11,color:"var(--mist)"}}>{filtered.length} sipariş</span>
      </div>
    </div>
    <div className="kpi-grid" style={{marginBottom:14}}>
      <div className="kpi kpi-jade"><div className="kpi-label">Toplam Ciro</div><div className="kpi-val">{convertCurrency(totalRev,cur)}</div></div>
      <div className="kpi kpi-amber"><div className="kpi-label">Tamamlanan</div><div className="kpi-val">{convertCurrency(completedRev,cur)}</div></div>
      <div className="kpi kpi-azure"><div className="kpi-label">Sipariş Sayısı</div><div className="kpi-val">{filtered.length}</div></div>
      <div className="kpi kpi-violet"><div className="kpi-label">Müşteri</div><div className="kpi-val">{customers.length}</div></div>
    </div>
    <div className="card">
      <div className="card-head"><div className="card-title">🏆 Müşteri Bazlı Satış</div></div>
      {byCustomer.length===0?<Empty icon="📊" text="Veri yok"/>:<div className="chart-bar">
        {byCustomer.slice(0,6).map((c,i)=><div key={c.name} className="chart-bar-row">
          <div className="chart-bar-label">{(c.name||"").slice(0,12)}</div>
          <div className="chart-bar-track"><div className="chart-bar-fill" style={{width:`${byCustomer[0]?(c.total/byCustomer[0].total)*100:0}%`,background:["var(--amber)","var(--jade)","var(--azure)","var(--violet)","var(--rose)","var(--mist)"][i]}}/></div>
          <div className="chart-bar-val">{convertCurrency(c.total,cur)}</div>
        </div>)}
      </div>}
    </div>
  </div>;
}

function SettingsPage(){
  const {user}=useAuth();
  const toast=useToast();
  const isAdmin=user?.role==="admin";
  const [activeTab,setActiveTab]=useState("profile");
  const [users,setUsers]=useState([]);
  const [loadingUsers,setLoadingUsers]=useState(false);
  const [addUserModal,setAddUserModal]=useState(false);
  const [newUser,setNewUser]=useState({email:"",password:"",name:"",role:"sales"});
  const [editRoleModal,setEditRoleModal]=useState(null);
  const [menuConfig,setMenuConfig]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("geoser_menu_config")||"null")||{dashboard:true,customers:true,orders:true,quotes:true,products:true,reports:true,settings:true};}
    catch{return{dashboard:true,customers:true,orders:true,quotes:true,products:true,reports:true,settings:true};}
  });
  const MENU_LABELS={dashboard:"🏠 Genel Bakış",customers:"👥 Müşteriler",orders:"📋 Siparişler",quotes:"📄 Teklifler",products:"📦 Ürün Listesi",reports:"📊 Raporlar",settings:"⚙️ Ayarlar"};
  const loadUsers=async()=>{
    if(!db)return;setLoadingUsers(true);
    try{const snap=await db.collection("users").get();setUsers(snap.docs.map(d=>({id:d.id,...d.data()})));}
    catch(e){toast("Kullanıcılar yüklenemedi: "+e.message,"err");}
    setLoadingUsers(false);
  };
  useEffect(()=>{if(activeTab==="users"&&isAdmin)loadUsers();},[activeTab]);
  const handleAddUser=async()=>{
    if(!newUser.email||!newUser.password){toast("E-posta ve şifre gerekli.","err");return;}
    if(newUser.password.length<6){toast("Şifre en az 6 karakter olmalı.","err");return;}
    try{
      const res=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=AIzaSyDukPJZqoRstmdwbW7MSTX4JPn_q-ps0rI`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:newUser.email,password:newUser.password,returnSecureToken:true})});
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      await db.collection("users").doc(data.localId).set({name:newUser.name||newUser.email,email:newUser.email,role:newUser.role,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      toast("Kullanıcı oluşturuldu: "+newUser.email);
      setAddUserModal(false);setNewUser({email:"",password:"",name:"",role:"sales"});loadUsers();
    }catch(e){toast(e.message,"err");}
  };
  const handleChangeRole=async(userId,newRole)=>{
    try{await db.collection("users").doc(userId).update({role:newRole});toast("Rol güncellendi.");setEditRoleModal(null);loadUsers();}
    catch(e){toast("Hata: "+e.message,"err");}
  };
  const handleDeleteUser=async(userId,email)=>{
    if(!confirm(email+" kullanıcısını silmek istediğinize emin misiniz?"))return;
    try{await db.collection("users").doc(userId).delete();toast("Kullanıcı silindi.");loadUsers();}
    catch(e){toast("Hata: "+e.message,"err");}
  };
  const saveMenuConfig=(cfg)=>{setMenuConfig(cfg);localStorage.setItem("geoser_menu_config",JSON.stringify(cfg));toast("Menü kaydedildi. Sayfayı yenileyin.")};
  const ROLE_OPTS=[{v:"admin",l:"👑 Yönetici"},{v:"sales",l:"💼 Satış"},{v:"production",l:"⚙️ Üretim"},{v:"accounting",l:"📊 Muhasebe"}];
  const tabs=[{id:"profile",label:"👤 Profil"},...(isAdmin?[{id:"users",label:"👥 Kullanıcılar"},{id:"menu",label:"🗂️ Menü Yönetimi"},{id:"system",label:"🔥 Sistem"}]:[])];
  return <div>
    <div className="page-head"><div className="page-title">⚙️ Ayarlar</div></div>
    <div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"1px solid var(--rim)",paddingBottom:8,flexWrap:"wrap"}}>
      {tabs.map(t=><button key={t.id} className={`btn btn-sm ${activeTab===t.id?"btn-amber":"btn-ghost"}`} onClick={()=>setActiveTab(t.id)}>{t.label}</button>)}
    </div>
    {activeTab==="profile"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div className="card">
        <div className="card-head"><div className="card-title">👤 Hesap Bilgilerim</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[["E-posta",user?.email||"-"],["Rol",ROLES[user?.role]?.label||user?.role||"-"],["Ad",user?.displayName||user?.name||"-"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"var(--ink3)",borderRadius:8}}>
              <span style={{fontSize:11,color:"var(--mist)",textTransform:"uppercase",letterSpacing:1}}>{l}</span>
              <span style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--sky)"}}>{v}</span>
            </div>
          ))}
          <div style={{padding:"9px 12px",background:"var(--amber3)",border:"1px solid rgba(245,166,35,.2)",borderRadius:8,fontSize:11,color:"var(--amber)"}}>
            🔐 Şifrenizi değiştirmek için çıkış yapıp "Şifremi unuttum" seçeneğini kullanın.
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-head"><div className="card-title">🏭 Şirket</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[["Şirket","GEOSER Geosentetik İmalat A.Ş."],["Sektör","Geosentetik Üretim"],["Ürün Gamı","HDPE, PVC, Jeotekstil, Geonet"],["İhracat","40+ Ülke"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"var(--ink3)",borderRadius:8}}>
              <span style={{fontSize:11,color:"var(--mist)",textTransform:"uppercase",letterSpacing:1}}>{l}</span>
              <span style={{fontSize:12,color:"var(--sky)",fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>}
    {activeTab==="users"&&isAdmin&&<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,color:"var(--mist)"}}>Sisteme erişimi olan kullanıcılar</div>
        <button className="btn btn-amber" onClick={()=>setAddUserModal(true)}>＋ Kullanıcı Ekle</button>
      </div>
      {loadingUsers?<div className="loading"><div className="spin"/></div>:
      <div className="tbl-wrap"><table>
        <thead><tr><th>Ad</th><th>E-posta</th><th>Rol</th><th>İşlem</th></tr></thead>
        <tbody>{users.map(u=><tr key={u.id}>
          <td style={{fontWeight:600}}>{u.name||"-"}</td>
          <td style={{fontFamily:"var(--font-m)",fontSize:12,color:"var(--mist)"}}>{u.email}</td>
          <td><span className={`badge ${u.role==="admin"?"b-amber":u.role==="sales"?"b-azure":u.role==="production"?"b-jade":"b-violet"}`}>{ROLES[u.role]?.icon} {ROLES[u.role]?.label||u.role}</span></td>
          <td><div style={{display:"flex",gap:4}}>
            <button className="btn btn-ghost btn-xs" onClick={()=>setEditRoleModal(u)}>👑 Rol Değiştir</button>
            {u.id!==user?.uid&&<button className="btn btn-danger btn-xs" onClick={()=>handleDeleteUser(u.id,u.email)}>🗑</button>}
          </div></td>
        </tr>)}</tbody>
      </table></div>}
      {users.length===0&&!loadingUsers&&<Empty icon="👥" text="Kullanıcı bulunamadı."/>}
    </div>}
    {activeTab==="menu"&&isAdmin&&<div>
      <div style={{fontSize:13,color:"var(--mist)",marginBottom:12}}>Hangi sekmelerin görüneceğini ayarlayın.</div>
      <div className="card">
        <div className="card-head"><div className="card-title">🗂️ Menü Sekmeleri</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {Object.entries(MENU_LABELS).map(([key,label])=>(
            <div key={key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"var(--ink3)",borderRadius:8}}>
              <span style={{fontSize:13,fontWeight:500}}>{label}</span>
              <div style={{width:36,height:20,borderRadius:10,background:menuConfig[key]?"var(--amber)":"var(--rim2)",position:"relative",cursor:key==="settings"?"not-allowed":"pointer",transition:"background .2s"}}
                onClick={()=>{if(key!=="settings")setMenuConfig(p=>({...p,[key]:!p[key]}))}}>
                <div style={{width:16,height:16,borderRadius:"50%",background:"white",position:"absolute",top:2,left:menuConfig[key]?18:2,transition:"left .2s"}}/>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:12,display:"flex",gap:8}}>
          <button className="btn btn-amber" onClick={()=>saveMenuConfig(menuConfig)}>💾 Menüyü Kaydet</button>
          <button className="btn btn-ghost" onClick={()=>saveMenuConfig({dashboard:true,customers:true,orders:true,quotes:true,products:true,reports:true,settings:true})}>↺ Sıfırla</button>
        </div>
      </div>
    </div>}
    {activeTab==="system"&&isAdmin&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <div className="card">
        <div className="card-head"><div className="card-title">🔥 Firebase</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[["Project ID","geoser-erp"],["Auth Domain","geoser-erp.firebaseapp.com"],["Firestore","europe-west3 (Frankfurt)"],["Durum","✅ Aktif"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"var(--ink3)",borderRadius:8}}>
              <span style={{fontSize:11,color:"var(--mist)",textTransform:"uppercase",letterSpacing:1}}>{l}</span>
              <span style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--jade)"}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-head"><div className="card-title">🌐 Site</div></div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[["URL","erdal0007.github.io/geoser-erp"],["Hosting","GitHub Pages"],["Versiyon","v4.0"]].map(([l,v])=>(
            <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"9px 12px",background:"var(--ink3)",borderRadius:8}}>
              <span style={{fontSize:11,color:"var(--mist)",textTransform:"uppercase",letterSpacing:1}}>{l}</span>
              <span style={{fontFamily:"var(--font-m)",fontSize:11,color:"var(--sky)"}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:10}}>
          <a href="https://console.firebase.google.com/project/geoser-erp/authentication/users" target="_blank" className="btn btn-ghost btn-sm" style={{width:"100%",justifyContent:"center"}}>🔥 Firebase Console'u Aç</a>
        </div>
      </div>
    </div>}
    {addUserModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setAddUserModal(false)}>
      <div className="modal">
        <div className="modal-head"><span className="modal-title">👤 Yeni Kullanıcı Ekle</span><button className="btn btn-ghost btn-xs" onClick={()=>setAddUserModal(false)}>✕</button></div>
        <div className="modal-body">
          <div className="field"><label>Ad Soyad</label><input value={newUser.name} onChange={e=>setNewUser(p=>({...p,name:e.target.value}))} placeholder="Ali Kaya"/></div>
          <div className="field"><label>E-posta *</label><input type="email" value={newUser.email} onChange={e=>setNewUser(p=>({...p,email:e.target.value}))} placeholder="ali@geoser.com"/></div>
          <div className="field"><label>Şifre * (min 6 karakter)</label><input type="password" value={newUser.password} onChange={e=>setNewUser(p=>({...p,password:e.target.value}))} placeholder="••••••••"/></div>
          <div className="field"><label>Rol</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:4}}>
              {ROLE_OPTS.map(r=><div key={r.v} onClick={()=>setNewUser(p=>({...p,role:r.v}))}
                style={{padding:"8px 10px",borderRadius:8,border:`1px solid ${newUser.role===r.v?"var(--amber)":"var(--rim)"}`,background:newUser.role===r.v?"var(--amber3)":"transparent",cursor:"pointer",fontSize:12,fontWeight:500}}>{r.l}</div>)}
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost btn-sm" onClick={()=>setAddUserModal(false)}>İptal</button>
          <button className="btn btn-amber btn-sm" onClick={handleAddUser}>✅ Kullanıcı Oluştur</button>
        </div>
      </div>
    </div>}
    {editRoleModal&&<div className="overlay" onClick={e=>e.target===e.currentTarget&&setEditRoleModal(null)}>
      <div className="modal" style={{maxWidth:380}}>
        <div className="modal-head"><span className="modal-title">👑 Rol Değiştir</span><button className="btn btn-ghost btn-xs" onClick={()=>setEditRoleModal(null)}>✕</button></div>
        <div className="modal-body">
          <div style={{fontSize:12,color:"var(--mist)",marginBottom:12}}>{editRoleModal.email} — yeni rol seçin:</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {ROLE_OPTS.map(r=><div key={r.v} onClick={()=>handleChangeRole(editRoleModal.id,r.v)}
              style={{padding:"10px 14px",borderRadius:8,border:`1px solid ${editRoleModal.role===r.v?"var(--amber)":"var(--rim)"}`,background:editRoleModal.role===r.v?"var(--amber3)":"var(--ink3)",cursor:"pointer",fontSize:13,fontWeight:500,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span>{r.l}</span>
              {editRoleModal.role===r.v&&<span style={{fontSize:10,color:"var(--amber)"}}>✓ Mevcut</span>}
            </div>)}
          </div>
        </div>
      </div>
    </div>}
  </div>;
}

const NAV=[
  {section:"ANA"},
  {id:"dashboard",icon:"🏠",label:"Genel Bakış"},
  {section:"SATIŞ"},
  {id:"customers",icon:"👥",label:"Müşteriler"},
  {id:"orders",icon:"📋",label:"Siparişler"},
  {id:"quotes",icon:"📄",label:"Teklifler"},
  {section:"STOK"},
  {id:"products",icon:"📦",label:"Ürün Listesi"},
  {section:"ANALİZ"},
  {id:"reports",icon:"📊",label:"Raporlar"},
  {section:"SİSTEM"},
  {id:"settings",icon:"⚙️",label:"Ayarlar"},
];
const PAGE_TITLES={dashboard:"Genel Bakış",customers:"Müşteriler",orders:"Siparişler",quotes:"Teklifler",products:"Ürünler",reports:"Raporlar",settings:"Ayarlar"};
const PAGES={dashboard:Dashboard,customers:CustomersPage,products:ProductsPage,orders:OrdersPage,quotes:QuotesPage,reports:ReportsPage,settings:SettingsPage};

function AppShell(){
  const {user,logout,hasPage}=useAuth();
  const toast=useToast();
  const [page,setPage]=useState("dashboard");
  const [collapsed,setCollapsed]=useState(false);
  const [mobileOpen,setMobileOpen]=useState(false);
  const PageComp=PAGES[page]||Dashboard;
  const role=user?.role||"admin";
  const roleInfo=ROLES[role]||ROLES.admin;
  const visibleNav=NAV.filter(n=>!n.id||hasPage(n.id));
  const handleLogout=async()=>{try{await logout();toast("Çıkış yapıldı.")}catch(e){toast(e.message,"err")}};
  const navTo=(id)=>{setPage(id);setMobileOpen(false)};
  return <div className="shell">
    {mobileOpen&&<div className="mobile-overlay" onClick={()=>setMobileOpen(false)}/>}
    <nav className={`nav${collapsed?" collapsed":""}${mobileOpen?" mobile-open":""}`}>
      <div className="nav-logo">
        <div className="nav-logo-mark">G</div>
        {!collapsed&&<div className="nav-logo-text"><div className="nav-logo-title">GEOSER ERP</div><div className="nav-logo-sub">v4.0</div></div>}
      </div>
      <div className="nav-body">
        {visibleNav.map((n,i)=>n.section
          ?(!collapsed?<div key={i} className="nav-section">{n.section}</div>:null)
          :<div key={n.id} className={`nav-item${page===n.id?" active":""}`} onClick={()=>navTo(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            {!collapsed&&<span>{n.label}</span>}
          </div>
        )}
      </div>
      <div className="nav-foot">
        <div className="user-row" onClick={()=>navTo("settings")}>
          <div className="user-av">{(user?.displayName||user?.email||"U")[0].toUpperCase()}</div>
          {!collapsed&&<div className="user-info"><div className="user-name">{user?.displayName||user?.email}</div><div className="user-role">{roleInfo.icon} {roleInfo.label}</div></div>}
          {!collapsed&&<button className="logout-btn" onClick={e=>{e.stopPropagation();handleLogout()}} title="Çıkış">⏻</button>}
        </div>
      </div>
    </nav>
    <div className="main">
      <div className="topbar">
        <div className="topbar-left">
          <button className="hamburger" onClick={()=>{if(window.innerWidth<768)setMobileOpen(v=>!v);else setCollapsed(v=>!v)}}>☰</button>
          <span className="breadcrumb">{PAGE_TITLES[page]||"Dashboard"}</span>
        </div>
        <div className="topbar-right">
          <div className="topbar-chip" style={{color:roleInfo.color}}>{roleInfo.icon} {roleInfo.label}</div>
          <div className="topbar-chip"><span className="sync-dot sync-ok"/>Bağlı</div>
          <div className="topbar-chip" style={{fontFamily:"var(--font-m)",fontSize:10}}>{new Date().toLocaleDateString("tr-TR")}</div>
        </div>
      </div>
      <div className="content"><PageComp/></div>
    </div>
  </div>;
}

function Root(){
  const {user}=useAuth();
  if(user===undefined)return <div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--ink)"}}>
    <div style={{textAlign:"center"}}><div className="spin" style={{margin:"0 auto 12px"}}/><div style={{fontSize:12,color:"var(--mist)",fontFamily:"var(--font-m)"}}>Bağlanıyor…</div></div>
  </div>;
  if(!user)return <LoginPage/>;
  return <AppShell/>;
}
function App(){return <AuthProvider><ToastProvider><Root/></ToastProvider></AuthProvider>}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<style>@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:none;opacity:1}}</style>
</body>
