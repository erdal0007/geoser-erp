/* FIRESTORE HOOK */
function useCol(col){
  const [items,setItems]=useState([]);
  const [loading,setLoading]=useState(true);
  const lk=`erp_${col}`;
  const local=()=>{try{return JSON.parse(localStorage.getItem(lk)||"[]")}catch{return[]}};
  useEffect(()=>{
    if(!db||!col){setItems(local());setLoading(false);return}
    setLoading(true);
    const unsub=firebase.firestore().collection(col).orderBy("_ts","desc").limit(500).onSnapshot(
      snap=>{
        if(snap.empty){const s=local();if(s.length>0)setItems(s);}
        else{const data=snap.docs.map(d=>({...d.data(),id:d.id}));setItems(data);localStorage.setItem(lk,JSON.stringify(data));}
        setLoading(false);
      },
      err=>{console.warn(col,"offline:",err.code);setItems(local());setLoading(false);}
    );
    return unsub;
  },[col]);
  const save=async data=>{
    const id=data.id||uid();
    const payload={...data,id,_ts:firebase.firestore.FieldValue.serverTimestamp()};
    try{await db.collection(col).doc(id).set(payload,{merge:true})}catch{}
    const arr=local();const lp={...data,id,_ts:new Date().toISOString()};
    const idx=arr.findIndex(x=>x.id===id);if(idx>=0)arr[idx]=lp;else arr.unshift(lp);
    localStorage.setItem(lk,JSON.stringify(arr));
    setItems(a=>{const ni=[...a];const i=ni.findIndex(x=>x.id===id);if(i>=0)ni[i]=lp;else ni.unshift(lp);return ni});
    return id;
  };
  const remove=async id=>{
    try{await db.collection(col).doc(id).delete()}catch{}
    const arr=local().filter(x=>x.id!==id);localStorage.setItem(lk,JSON.stringify(arr));
    setItems(a=>a.filter(x=>x.id!==id));
  };
  const update=async(id,data)=>{
    try{await db.collection(col).doc(id).update({...data,_updated:firebase.firestore.FieldValue.serverTimestamp()})}catch{}
    const cur=local().find(x=>x.id===id)||{};await save({...cur,...data,id});
  };
  return{items,loading,save,remove,update,setItems};
}

/* FORMULA ENGINE */
function FormulaEngine(){
  const{items:formulas,loading:lf,save:saveF,remove:removeF}=useCol("formulas");
  const{items:rawMats}=useCol("rawMaterials");
  const toast=useToast();
  const[tab,setTab]=useState("calc");
  const[selF,setSelF]=useState("");
  const[modal,setModal]=useState(false);const[form,setForm]=useState({productCode:"",productName:"",version:"v1.0",unit:"100kg batch",description:"",rollWeightKg:0,rollsPerBatch:0,active:true,items:[]});
  const[eid,setEid]=useState(null);const[del,setDel]=useState(null);
  const Ff=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setItem=(i,k,v)=>setForm(f=>{const its=[...f.items];its[i]={...its[i],[k]:v};return{...f,items:its}});
  const addItem=()=>setForm(f=>({...f,items:[...f.items,{materialId:"",materialName:"",unit:"kg",qty:0}]}));
  const removeItem=i=>setForm(f=>({...f,items:f.items.filter((_,idx)=>idx!==i)}));
  const openAdd=()=>{setForm({productCode:"",productName:"",version:"v1.0",unit:"100kg batch",description:"",rollWeightKg:0,rollsPerBatch:0,active:true,items:[]});setEid(null);setModal(true)};
  const openEdit=f=>{setForm({...f,items:f.items?[...f.items.map(i=>({...i}))]:[]});setEid(f.id);setModal(true)};
  const handleSave=async()=>{if(!form.productName){toast("Ürün adı gerekli.","err");return}await saveF({...form,id:eid||uid()});toast(eid?"Güncellendi.":"Eklendi.");setModal(false)};
  const handleSeed=async()=>{for(const f of SEED_FORMULAS)await saveF(f);toast("Örnek formül yüklendi.")};
  const calcResult=useMemo(()=>{
    if(!selF)return null;
    const f=formulas.find(x=>x.id===selF);
    if(!f||!f.items)return null;
    const results=f.items.map(item=>{
      const raw=rawMats.find(r=>r.id===item.materialId);
      const usable=raw?Number(raw.stock)-Number(raw.reserved||0):0;
      const maxBatches=Number(item.qty)>0?Math.floor(usable/Number(item.qty)):999999;
      return{name:item.materialName||raw?.name||"—",req:Number(item.qty),unit:item.unit,avail:usable,maxBatches,status:usable>=Number(item.qty)?"ok":"low"};
    });
    const limiting=Math.min(...results.filter(r=>r.maxBatches!==999999).map(r=>r.maxBatches));
    results.forEach(r=>{r.isLim=r.maxBatches===limiting});
    const maxRolls=isFinite(limiting)?limiting*Number(f.rollsPerBatch||1):0;
    return{f,results,limiting:isFinite(limiting)?limiting:0,maxRolls,limItem:results.find(r=>r.isLim)};
  },[selF,formulas,rawMats]);
  const fCols=[{k:"productCode",l:"Ürün Kodu",render:v=><span className="mono" style={{fontSize:11}}>{v||"—"}</span>},{k:"productName",l:"Ürün Adı",render:v=><strong style={{fontSize:12}}>{v}</strong>},{k:"version",l:"Versiyon",render:v=><Badge label={v} color="var(--blue)"/>},{k:"rollsPerBatch",l:"Rulo/Batch",r:true},{k:"rollWeightKg",l:"Ağırlık (kg)",r:true},{k:"active",l:"Durum",render:v=><Badge label={v?"Aktif":"Pasif"} color={v?"var(--green)":"var(--tx3)"}/>},{k:"_act",l:"",render:(_,row)=><div style={{display:"flex",gap:4}}><button className="btn btn-ghost btn-xs" onClick={e=>{e.stopPropagation();openEdit(row)}}>✏</button><button className="btn btn-danger btn-xs" onClick={e=>{e.stopPropagation();setDel(row.id)}}>🗑</button></div>}];
  return<div className="fade">
    <div className="pg-head">
      <div><div className="pg-title">⚗️ Formül & Üretilebilir Miktar</div><div className="pg-sub">Hammadde stokuna göre otomatik üretilebilir miktar hesaplama motoru</div></div>
      <div style={{display:"flex",gap:8}}>
        {formulas.length===0&&<button className="btn btn-ghost btn-sm" onClick={handleSeed}>📥 Örnek Formül</button>}
        <button className="btn btn-primary btn-sm" onClick={openAdd}>＋ Formül Ekle</button>
      </div>
    </div>
    <Tabs tabs={[{id:"calc",icon:"🧮",label:"Hesap Makinesi",count:formulas.length},{id:"list",icon:"📋",label:"Formül Listesi"}]} active={tab} onChange={setTab}/>
    {tab==="calc"&&<div>
      <div className="card" style={{marginBottom:15}}>
        <div className="card-body"><F label="Formül / Ürün Seçin"><Sel value={selF} onChange={e=>setSelF(e.target.value)}><option value="">— Formül seçin —</option>{formulas.filter(f=>f.active!==false).map(f=><option key={f.id} value={f.id}>{f.productName} ({f.version})</option>)}</Sel></F></div>
      </div>
      {calcResult&&<div>
        <div className="kpi-grid" style={{marginBottom:15}}>
          <StatCard icon="🏭" label="Maks. Üretilebilir" val={`${fmtN(calcResult.maxRolls)} Rulo`} sub={`${calcResult.limiting} batch`} color={calcResult.maxRolls>0?"var(--green)":"var(--red)"}/>
          <StatCard icon="⚗️" label="Maks. Batch" val={calcResult.limiting} color="var(--blue)"/>
          <StatCard icon="⚠" label="Sınırlayan" val={calcResult.limItem?.name?.slice(0,18)||"—"} color="var(--amber)"/>
          <StatCard icon="⚖" label="Rulo Ağırlığı" val={`${calcResult.f.rollWeightKg} kg`} color="var(--purple)"/>
        </div>
        <div className="card">
          <div className="card-head"><span className="card-title">Hammadde Analizi</span><span style={{fontSize:11,color:"var(--tx3)"}}>Mevcut stok bazlı hesaplama</span></div>
          <div className="tbl-wrap"><table>
            <thead><tr>{["Hammadde","Gerekli/Batch","Birim","Mevcut Stok","Maks. Batch","Durum"].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>{calcResult.results.map((r,i)=><tr key={i} style={{background:r.isLim?"rgba(210,153,34,.04)":r.status==="low"?"rgba(248,81,73,.04)":"transparent"}}>
              <td style={{fontWeight:r.isLim?700:400}}>{r.isLim&&<span style={{marginRight:5}}>⚠</span>}{r.name}</td>
              <td style={{textAlign:"right",fontFamily:"var(--mono)"}}>{fmtN(r.req)}</td>
              <td style={{fontSize:11,color:"var(--tx2)"}}>{r.unit}</td>
              <td style={{textAlign:"right",fontFamily:"var(--mono)",color:r.status==="low"?"var(--red)":"var(--green)"}}>{fmtN(r.avail)} {r.unit}</td>
              <td style={{textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,color:r.isLim?"var(--amber)":"var(--tx)"}}>{isFinite(r.maxBatches)&&r.maxBatches<999999?r.maxBatches:"∞"}</td>
              <td>{r.status==="low"?<Badge label="YETERSİZ" color="var(--red)"/>:r.isLim?<Badge label="SINIRLIYOR" color="var(--amber)"/>:<Badge label="YETERLİ" color="var(--green)"/>}</td>
            </tr>)}</tbody>
          </table></div>
          <div style={{padding:"0 14px 14px"}}>
            {calcResult.maxRolls===0?<div className="alert alert-err" style={{marginTop:11}}>⛔ Yetersiz hammadde — üretim başlatılamaz.</div>:<div className="alert alert-ok" style={{marginTop:11}}>✓ Mevcut stokla maksimum <strong>{fmtN(calcResult.maxRolls)} rulo</strong> ({calcResult.limiting} batch) üretilebilir. Sınırlayan: <strong>{calcResult.limItem?.name}</strong></div>}
          </div>
        </div>
      </div>}

        <div style={{marginBottom:12}}>Henüz formül yok.</div>
        <button className="btn btn-primary" onClick={handleSeed}>📥 Örnek Formül Yükle</button>
      </div>}
    </div>}
    {tab==="list"&&<div className="card">{lf?<Spin/>:<Tbl cols={fCols} data={formulas} empty="Formül yok."/>}</div>}
    {modal&&<Modal title={eid?"Formül Düzenle":"Yeni Formül"} onClose={()=>setModal(false)} onSave={handleSave} wide>

/* COST CALCULATION */
const COST_DEF={laborPerHour:120,rentPerMonth:25000,electricityPerKwh:4.5,packagingPerRoll:15,palletCost:120,overheadPct:12,targetMarginPct:25};
function CostCalculation(){
  const{items:formulas}=useCol("formulas");
  const{items:rawMats}=useCol("rawMaterials");
  const{items:history,loading:lh,save:saveH}=useCol("costHistory");
  const toast=useToast();
  const[tab,setTab]=useState("calc");
  const[settings,setSettings]=useState(()=>{try{return JSON.parse(localStorage.getItem("erp_costSettings")||"null")||COST_DEF}catch{return COST_DEF}});
  const[selF,setSelF]=useState("");const[qty,setQty]=useState(1);const[marginPct,setMarginPct]=useState(settings.targetMarginPct||25);
  const Fs=(k,v)=>setSettings(s=>({...s,[k]:v}));
  const saveSt=()=>{localStorage.setItem("erp_costSettings",JSON.stringify(settings));toast("Ayarlar kaydedildi.")};
  const calcResult=useMemo(()=>{
    if(!selF)return null;
    const f=formulas.find(x=>x.id===selF);
    if(!f||!f.items)return null;
    let matCost=0;const breakdown=[];
    f.items.forEach(item=>{
      const raw=rawMats.find(r=>r.id===item.materialId);
      const uc=raw?Number(raw.cost||0):0;
      const total=Number(item.qty||0)*uc;
      matCost+=total;
      breakdown.push({name:item.materialName||raw?.name||"—",qty:item.qty,unit:item.unit,uc,total});
    });
    const rpb=Number(f.rollsPerBatch||1);
    const matPerRoll=rpb>0?matCost/rpb:0;
    const laborPerRoll=rpb>0?(8*Number(settings.laborPerHour||0))/rpb:0;
    const overheadPerRoll=Number(settings.rentPerMonth||0)/500;
    const energyPerRoll=rpb>0?(8*Number(settings.electricityPerKwh||0)*15)/rpb:0;
    const packPerRoll=Number(settings.packagingPerRoll||0);
    const palletPerRoll=Number(settings.palletCost||0)/20;
    const sub=matPerRoll+laborPerRoll+overheadPerRoll+energyPerRoll+packPerRoll+palletPerRoll;
    const oh=sub*Number(settings.overheadPct||0)/100;
    const total=sub+oh;
    const margin=total*Number(marginPct)/100;
    const price=total+margin;
    const totalQty=Number(qty)||1;
    return{f,matPerRoll,laborPerRoll,overheadPerRoll,energyPerRoll,packPerRoll,palletPerRoll,sub,oh,total,margin,price,breakdown,totalQty,totalCost:total*totalQty,totalRev:price*totalQty,totalProfit:margin*totalQty,matPct:total>0?matPerRoll/total*100:0};
  },[selF,formulas,rawMats,settings,marginPct,qty]);
  const CRow=({label,value,highlight})=><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 11px",background:highlight?"rgba(56,139,253,.06)":"var(--bg3)",borderRadius:6,marginBottom:4,border:`1px solid ${highlight?"rgba(56,139,253,.2)":"var(--bd)"}`}}>
    <span style={{fontSize:12,color:highlight?"var(--tx)":"var(--tx2)",fontWeight:highlight?700:400}}>{label}</span>
    <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:highlight?14:12,color:highlight?"var(--blue)":"var(--tx)"}}>{fmtM(value)}</span>
  </div>;
  const hCols=[{k:"date",l:"Tarih",render:v=><span className="mono" style={{fontSize:11}}>{v}</span>},{k:"formulaName",l:"Ürün"},{k:"costPerRoll",l:"Maliyet/Rulo",r:true,render:v=><span className="mono" style={{color:"var(--amber)"}}>{fmtM(v)}</span>},{k:"pricePerRoll",l:"Satış Fiyatı/Rulo",r:true,render:v=><span className="mono" style={{fontWeight:700,color:"var(--green)"}}>{fmtM(v)}</span>},{k:"marginPct",l:"Marj",r:true,render:v=><Badge label={`%${v}`} color="var(--blue)"/>}];
  return<div className="fade">
    <div className="pg-head">
      <div><div className="pg-title">💰 Maliyet Hesaplama</div><div className="pg-sub">Otomatik maliyet hesaplama motoru — formül + hammadde stok fiyatı bazlı</div></div>
      {calcResult&&<button className="btn btn-ghost btn-sm" onClick={async()=>{await saveH({id:uid(),date:today(),formulaName:calcResult.f.productName,formulaId:selF,costPerRoll:calcResult.total,pricePerRoll:calcResult.price,marginPct:Number(marginPct)});toast("Anlık görüntü kaydedildi.")}}>📸 Anlık Görüntü</button>}
    </div>
    <Tabs tabs={[{id:"calc",icon:"🧮",label:"Hesaplama"},{id:"settings",icon:"⚙️",label:"Parametreler"},{id:"history",icon:"📜",label:"Geçmiş",count:history.length}]} active={tab} onChange={setTab}/>
    {tab==="calc"&&<div>
      <div className="card" style={{marginBottom:15}}>
        <div className="card-body">
          <div className="form-grid">
            <F label="Formül / Ürün"><Sel value={selF} onChange={e=>setSelF(e.target.value)}><option value="">— Formül Seçin —</option>{formulas.map(f=><option key={f.id} value={f.id}>{f.productName} ({f.version})</option>)}</Sel></F>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9}}>
              <F label="Adet (Rulo)"><Inp type="number" min="1" value={qty} onChange={e=>setQty(e.target.value)}/></F>
              <F label="Hedef Marj (%)"><Inp type="number" value={marginPct} onChange={e=>setMarginPct(e.target.value)}/></F>
            </div>
          </div>
        </div>
      </div>
      {calcResult&&<div className="grid2">
        <div>
          <div style={{fontSize:13,fontWeight:700,marginBottom:11}}>💵 Maliyet Dökümü (Rulo Başına)</div>
          <div className="card"><div className="card-body" style={{padding:"12px"}}>
            <CRow label="🧪 Hammadde" value={calcResult.matPerRoll}/>
            <CRow label="👷 İşçilik" value={calcResult.laborPerRoll}/>
            <CRow label="🏭 Kira / Sabit" value={calcResult.overheadPerRoll}/>
            <CRow label="⚡ Enerji" value={calcResult.energyPerRoll}/>
            <CRow label="📦 Ambalaj" value={calcResult.packPerRoll}/>
            <CRow label="🔲 Palet Payı" value={calcResult.palletPerRoll}/>
            <div style={{height:1,background:"var(--bd)",margin:"7px 0"}}/>
            <CRow label="Alt Toplam" value={calcResult.sub}/>
            <CRow label={`Genel Gider (%${settings.overheadPct})`} value={calcResult.oh}/>
            <div style={{height:1,background:"var(--bd)",margin:"7px 0"}}/>
            <CRow label="✅ TOPLAM MALİYET / RULO" value={calcResult.total} highlight/>
            <CRow label={`📈 Kâr Marjı (%${marginPct})`} value={calcResult.margin}/>
            <div style={{padding:"11px",background:"rgba(63,185,80,.06)",border:"1px solid rgba(63,185,80,.2)",borderRadius:6,marginTop:5}}>
              <div style={{fontSize:9,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:3}}>💰 ÖNERİLEN SATIŞ FİYATI / RULO</div>
              <div style={{fontSize:22,fontWeight:800,color:"var(--green)",fontFamily:"var(--mono)"}}>{fmtM(calcResult.price)}</div>
            </div>
          </div></div>
        </div>
        <div>
          <div className="kpi-grid" style={{gridTemplateColumns:"1fr 1fr",marginBottom:13}}>
            <StatCard icon="💰" label="Toplam Maliyet" val={fmtM(calcResult.totalCost)} sub={`${qty} rulo`} color="var(--amber)"/>
            <StatCard icon="💵" label="Toplam Satış" val={fmtM(calcResult.totalRev)} sub={`${qty} rulo`} color="var(--green)"/>
            <StatCard icon="📈" label="Toplam Kâr" val={fmtM(calcResult.totalProfit)} color="var(--blue)"/>
            <StatCard icon="🧪" label="Ham. Oranı" val={`%${calcResult.matPct.toFixed(1)}`} color="var(--purple)"/>
          </div>
          <div className="card">
            <div className="card-head"><span className="card-title">Hammadde Detayı</span></div>
            <div style={{maxHeight:260,overflowY:"auto"}}>
              {calcResult.breakdown.map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 11px",background:"var(--bg3)",margin:"0 11px 4px",borderRadius:5}}>
                <div><div style={{fontSize:12}}>{m.name}</div><div style={{fontSize:10,color:"var(--tx3)",fontFamily:"var(--mono)"}}>{fmtN(m.qty)} {m.unit} × {fmtM(m.uc)}</div></div>
                <span style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:12,color:"var(--amber)"}}>{fmtM(m.total)}</span>
              </div>)}
            </div>
            <div style={{height:11}}/>
          </div>
        </div>
      </div>}

function BackupTab(){

}
function SecurityTab(){
  const toast=useToast();
  const[pin,setPin]=useState(localStorage.getItem("erp_pin")||"");const[pin2,setPin2]=useState("");
  const[autoBackup,setAutoBackup]=useState(localStorage.getItem("erp_auto_backup")!=="off");
  const savePin=()=>{if(pin&&pin!==pin2){toast("PIN'ler eşleşmiyor.","err");return}if(pin&&pin.length<4){toast("PIN en az 4 haneli.","err");return}if(pin&&!/^\d+$/.test(pin)){toast("Sadece rakam.","err");return}if(pin){localStorage.setItem("erp_pin",pin);toast("PIN kaydedildi.");}else{localStorage.removeItem("erp_pin");toast("PIN kaldırıldı.");}setPin2("")};
  const toggleAuto=()=>{const nv=!autoBackup;setAutoBackup(nv);if(nv)localStorage.removeItem("erp_auto_backup");else localStorage.setItem("erp_auto_backup","off");toast(nv?"Otomatik yedek açıldı.":"Otomatik yedek kapatıldı.")};
  return<div className="grid2">
    <div className="card">
      <div className="card-head"><span className="card-title">🔐 PIN Kilidi</span></div>
      <div className="card-body">
        <div className={`alert ${pin?"alert-ok":"alert-warn"}`} style={{marginBottom:13}}>{pin?`✅ PIN kilidi aktif — ${pin.length} haneli`:"⚠️ PIN kilidi kapalı"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          <F label="Yeni PIN (4-6 rakam)"><Inp type="password" maxLength={6} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,""))} placeholder="••••"/></F>
          <F label="PIN Tekrar"><Inp type="password" maxLength={6} value={pin2} onChange={e=>setPin2(e.target.value.replace(/\D/g,""))} placeholder="••••"/></F>
          <div style={{display:"flex",gap:8}}><button className="btn btn-primary btn-sm" onClick={savePin}>💾 PIN Kaydet</button>{pin&&<button className="btn btn-danger btn-sm" onClick={()=>{setPin("");setPin2("");localStorage.removeItem("erp_pin");toast("PIN kaldırıldı.")}}>Kaldır</button>}</div>
          <div className="hint">PIN bu tarayıcıda saklanır. Farklı cihazlarda ayrıca ayarlanmalıdır.</div>
        </div>
      </div>
    </div>
    <div className="card">
      <div className="card-head"><span className="card-title">⚙️ Güvenlik Ayarları</span></div>
      <div className="card-body">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 11px",background:"var(--bg3)",borderRadius:6,marginBottom:9}}>
          <div><div style={{fontSize:12,fontWeight:600}}>Otomatik Günlük Yedek</div><div className="hint">Her gün sistemi açınca otomatik yedek indirir</div></div>
          <div onClick={toggleAuto} style={{width:37,height:21,borderRadius:10,background:autoBackup?"var(--green)":"var(--bd2)",position:"relative",cursor:"pointer",transition:"background .2s"}}>
            <div style={{width:17,height:17,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:autoBackup?18:2,transition:"left .2s"}}/>
          </div>
        </div>
        <div className="alert alert-info"><div style={{fontSize:12,lineHeight:1.7}}>ℹ️ Güvenlik ipuçları:<br/>• Güçlü, tahmin edilemez şifreler kullanın<br/>• Kullanmadığınızda çıkış yapın<br/>• Yedekleri düzenli alın ve güvenli saklayın<br/>• Şifrelerinizi periyodik değiştirin</div></div>
      </div>
    </div>
  </div>;
}

      <div className="card-body">

          {[["Uygulama","GEOSER ERP"],["Versiyon","v1.0"],["Şirket","GEOSER Geosentetik İmalat A.Ş."],["Deploy","GitHub Pages"],["URL","erdal0007.github.io/geoser-erp"],["Yapı","React 18 + Firebase Compat"]].map(([l,v])=>(

/* NAV + APP SHELL */
const NAV=[
  {id:"dashboard",icon:"📊",label:"Dashboard",mod:"dashboard"},
  {section:"STOK"},
  {id:"stock",icon:"📦",label:"Ürün Stoku",mod:"stock"},
  {id:"rawmaterials",icon:"🧪",label:"Hammadde Stoku",mod:"rawmaterials"},
  {id:"formula",icon:"⚗️",label:"Formül & Üretilebilir",mod:"formula"},
  {section:"ÜRETİM"},
  {id:"orders",icon:"📋",label:"Üretim Siparişleri",mod:"orders"},
  {id:"production",icon:"🏭",label:"Üretim Takibi",mod:"production"},
  {section:"LOJİSTİK"},
  {id:"shipments",icon:"🚢",label:"Sevkiyat & Lojistik",mod:"shipments"},
  {section:"MALİYET"},
  {id:"costs",icon:"💰",label:"Maliyet Hesaplama",mod:"costs"},
  {id:"reports",icon:"📈",label:"Raporlar & PDF",mod:"reports"},
  {section:"SİSTEM"},
  {id:"settings",icon:"⚙️",label:"Ayarlar",mod:"settings",admin:true},
];
const PAGES={dashboard:Dashboard,stock:ProductStock,rawmaterials:RawMaterials,formula:FormulaEngine,orders:ProductionOrders,production:ProductionTracking,shipments:Shipments,costs:CostCalculation,reports:Reports,settings:Settings};

function AppShell(){
  const{user,logout,can,isAdmin}=useAuth();const toast=useToast();
  const[page,setPage]=useState("dashboard");
  const[slim,setSlim]=useState(false);const[mobileOpen,setMobileOpen]=useState(false);
  const P=PAGES[page]||Dashboard;
  const role=ROLES[user?.role]||ROLES.staff;
  const nav=NAV.filter(n=>{if(!n.id)return true;if(n.admin&&!isAdmin())return false;return can(n.mod)});
  const go=id=>{setPage(id);setMobileOpen(false)};
  const doLogout=async()=>{try{await logout();toast("Çıkış yapıldı.");}catch(e){toast(e.message,"err")}};

  useEffect(()=>{
    if(localStorage.getItem("erp_auto_backup")==="off")return;
    const last=localStorage.getItem("erp_lastBackup");
    if(!last||new Date(last).toDateString()!==new Date().toDateString()){
      setTimeout(()=>{
        const cols=["products","rawMaterials","productionOrders","productionLogs","shipments","formulas"];
        const data={};
        cols.forEach(c=>{try{data[c]=JSON.parse(localStorage.getItem(`erp_${c}`)||"[]")}catch{data[c]=[]}});
        downloadJSON({meta:{version:"v1.0",createdAt:new Date().toISOString(),auto:true},data},`GEOSER_ERP_OtoYedek_${today()}.json`);
        localStorage.setItem("erp_lastBackup",new Date().toISOString());
        toast("✅ Günlük otomatik yedek alındı.");
      },4000);
    }
  },[]);

  return<div className="shell">
    {mobileOpen&&<div className="mobile-overlay" onClick={()=>setMobileOpen(false)}/>}
    <aside className={`sidebar${slim?" slim":""}${mobileOpen?" mobile-open":""}`}>
      <div className="s-logo">
        <div className="s-logo-icon">🏭</div>
        {!slim&&<div><div className="s-logo-name">GEOSER ERP</div><div className="s-logo-sub">Geosentetik İmalat</div></div>}
      </div>
      <nav className="s-body">
        {nav.map((n,i)=>{
          if(n.section)return slim?null:<div key={i} className="s-section">{n.section}</div>;
          return<div key={n.id} className={`s-item${page===n.id?" on":""}`} onClick={()=>go(n.id)} title={slim?n.label:undefined}>
            <span className="s-icon">{n.icon}</span>
            {!slim&&<span>{n.label}</span>}
          </div>;
        })}
      </nav>
      <div className="s-foot">
        <div className="s-user">
          <div className="s-av" style={{background:role.color+"22",border:`1.5px solid ${role.color}`}}>{role.icon}</div>
          {!slim&&<>
            <div style={{flex:1,minWidth:0}}>
              <div className="s-uname">{user?.name||user?.email}</div>
              <div className="s-urole">{role.l}</div>
            </div>
            <button className="s-logout" onClick={doLogout} title="Çıkış">⏻</button>
          </>}
        </div>
      </div>
    </aside>
    <div className="main">
      <header className="topbar">
        <button className="hamburger" onClick={()=>{if(window.innerWidth<768)setMobileOpen(v=>!v);else setSlim(v=>!v)}}>☰</button>
        <div style={{flex:1}}/>
        <div className="tb-chip" style={{color:role.color}}>{role.icon} {role.l}</div>
        <div className="tb-chip"><span style={{color:"var(--green)",marginRight:3}}>●</span><span style={{fontFamily:"var(--mono)",fontSize:10}}>{new Date().toLocaleDateString("tr-TR")}</span></div>
      </header>
      <div className="content"><P/></div>
    </div>
  </div>;
}

function Root(){
  const{user}=useAuth();
  const[pinOk,setPinOk]=useState(()=>!localStorage.getItem("erp_pin"));
  useEffect(()=>{if(!localStorage.getItem("erp_pin"))setPinOk(true)},[]);
  if(!pinOk)return<PinScreen onUnlock={()=>setPinOk(true)}/>;
  if(user===undefined)return<div style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div style={{textAlign:"center"}}><div className="spinner" style={{margin:"0 auto 11px"}}/><div style={{fontSize:11,color:"var(--tx3)",fontFamily:"var(--mono)"}}>Bağlanıyor…</div></div></div>;
  if(!user)return<LoginPage/>;
  return<AppShell/>;
}
function App(){return<AuthProvider><ToastProvider><Root/></ToastProvider></AuthProvider>;}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
